apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ledger-data
  namespace: core-banking
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger
  namespace: core-banking
  labels:
    app: ledger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ledger
  template:
    metadata:
      labels:
        app: ledger
      # Uncomment for GKE Workload Identity:
      # annotations:
      #   iam.gke.io/gcp-service-account: ledger-sa@PROJECT_ID.iam.gserviceaccount.com
    spec:
      # Uncomment for GKE Workload Identity:
      # serviceAccountName: ledger-ksa
      containers:
        - name: ledger
          image: gcr.io/PROJECT_ID/ledger:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            # ── Database Backend ──
            # Set to "spanner" to use Cloud Spanner, or "sqlite" (default) for local SQLite.
            - name: DB_BACKEND
              value: "sqlite"
            # ── SQLite settings (used when DB_BACKEND=sqlite) ──
            - name: DATA_DIR
              value: "/app/data"
            # ── Spanner settings (used when DB_BACKEND=spanner) ──
            # - name: SPANNER_DATABASE
            #   value: "projects/PROJECT_ID/instances/core-banking-ledger/databases/ledger"
          volumeMounts:
            - name: ledger-data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
      volumes:
        - name: ledger-data
          persistentVolumeClaim:
            claimName: ledger-data
---
apiVersion: v1
kind: Service
metadata:
  name: ledger
  namespace: core-banking
spec:
  selector:
    app: ledger
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
