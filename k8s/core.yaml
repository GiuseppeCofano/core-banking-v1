apiVersion: apps/v1
kind: Deployment
metadata:
  name: core
  namespace: core-banking
  labels:
    app: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: core
  template:
    metadata:
      labels:
        app: core
    spec:
      containers:
        - name: core
          image: gcr.io/PROJECT_ID/core:latest
          ports:
            - containerPort: 8081
          env:
            - name: PORT
              value: "8081"
            - name: LEDGER_URL
              value: "http://ledger.core-banking.svc.cluster.local:8080"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: core
  namespace: core-banking
spec:
  selector:
    app: core
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
  type: ClusterIP
