apiVersion: apps/v1
kind: Deployment
metadata:
  name: processor
  namespace: core-banking
  labels:
    app: processor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: processor
  template:
    metadata:
      labels:
        app: processor
    spec:
      containers:
        - name: processor
          image: gcr.io/PROJECT_ID/processor:latest
          ports:
            - containerPort: 8082
          env:
            - name: PORT
              value: "8082"
            - name: CORE_URL
              value: "http://core.core-banking.svc.cluster.local:8081"
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: processor
  namespace: core-banking
spec:
  selector:
    app: processor
  ports:
    - port: 8082
      targetPort: 8082
      protocol: TCP
  type: LoadBalancer
